{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div
        class="max-w-md w-full space-y-8 glass-card p-8 rounded-2xl border border-white/10 shadow-2xl backdrop-blur-sm">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
                Add Student to Registry
            </h2>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-300">
                    {{ field.label }}
                </label>
                <div class="mt-1">
                    {{ field }}
                </div>
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300 ease-in-out transform hover:-translate-y-0.5">
                    Add Student
                </button>
            </div>
        </form>
    </div>
</div>
<style>
    /* basic styling for form fields since we are iterating manually without widget tweaks in python */
    input,
    select {
        background-color: rgba(31, 41, 55, 0.5);
        color: white;
        border: 1px solid rgba(75, 85, 99, 1);
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        width: 100%;
    }

    input:focus,
    select:focus {
        outline: none;
        border-color: #6366f1;
        ring: 2px solid #6366f1;
    }
</style>
{% endblock %}
