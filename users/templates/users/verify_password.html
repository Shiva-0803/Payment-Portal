{% extends 'base.html' %}

{% block title %}Verify Password - EduPay{% endblock %}

{% block content %}
<div class="card">
    <h2>Enter Password</h2>
    <p>Please verify your identity.</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit">Verify</button>
    </form>
</div>
{% endblock %}
