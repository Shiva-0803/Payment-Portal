{% extends 'base.html' %}

{% block title %}Verify OTP - EduPay{% endblock %}

{% block content %}
<div class="card">
    <h2>Verify OTP</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit">Verify</button>
    </form>
</div>
{% endblock %}
