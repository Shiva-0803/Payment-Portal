{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Student - EduPay{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Edit Student</h2>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="error-message" style="color: red; font-size: 0.9em; margin-top: 5px;">
                {{ field.errors.0 }}
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn" style="flex: 1;">Save Changes</button>
            <a href="{% url 'admin_dashboard' %}" class="btn"
                style="flex: 1; background-color: #95a5a6; text-align: center; line-height: 48px; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
