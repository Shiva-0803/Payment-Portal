{% extends 'base.html' %}

{% block title %}Complete Payment - EduPay{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="card" style="max-width: 600px; width: 100%; padding: 2rem;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Confirm Payment</h2>

        <div
            style="background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #e9ecef;">
            <p style="margin-bottom: 0.5rem;"><strong>Transaction ID:</strong> {{ transaction.payment_id }}</p>
            <p style="margin-bottom: 0.5rem;"><strong>Exam:</strong> {{ transaction.exam.name }}</p>
            <p style="margin-bottom: 0;"><strong>Amount to Pay:</strong> <span
                    style="color: #27ae60; font-weight: bold; font-size: 1.5rem;">₹{{ transaction.amount }}</span></p>
        </div>

        <button id="rzp-button1" class="btn"
            style="width: 100%; padding: 1rem; font-size: 1.2rem; margin-bottom: 1rem; background-color: #3399cc; border: none; color: white; cursor: pointer;">Pay
            Now with
            Razorpay</button>

        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
        <script>
            var options = {
                "key": "{{ razorpay_key_id }}",
                "amount": "{{ razorpay_amount }}",
                "currency": "INR",
                "name": "Exam Fee Portal",
                "description": "Fee Payment for {{ transaction.exam.name }}",
                "image": "https://example.com/your_logo", // You can replace this
                "order_id": "{{ razorpay_order_id }}",
                "callback_url": "{{ callback_url }}",
                "prefill": {
                    "name": "{{ transaction.student.username }}", // Or student.name if available
                    "email": "{{ transaction.student.email }}",
                    "contact": "{{ transaction.student.mobile_number }}"
                },
                "notes": {
                    "address": "College Address"
                },
                "theme": {
                    "color": "#3399cc"
                }
            };
            
            // To force a specific method to open first
            // You can optionally pass this in options, but a simple hack for testing UPI specifically
            options.method = 'upi';
            var rzp1 = new Razorpay(options);
            document.getElementById('rzp-button1').onclick = function (e) {
                rzp1.open();
                e.preventDefault();
            }
        </script>

        <div style="margin-top: 1rem; text-align: center;">
            <a href="{% url 'dashboard' %}" style="color: #666; text-decoration: none;">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
