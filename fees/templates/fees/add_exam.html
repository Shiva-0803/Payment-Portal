{% extends 'base.html' %}

{% block title %}Add Semester Exam - EduPay{% endblock %}

{% block content %}
<div class="card">
    <h2>Add New Semester Exam</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <button type="submit">Create Exam</button>
    </form>
    <br>
    <a href="{% url 'dashboard' %}">Back to Dashboard</a>
</div>
{% endblock %}
